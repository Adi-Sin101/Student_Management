name: Run Tests

on:
  push:
    branches: [ main, master, develop, feature/**, testing/** ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: student-management-system
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: student-management-system/pom.xml
          
    - name: Make mvnw executable
      run: chmod +x student-management-system/mvnw
        
    - name: Run tests with Maven
      run: ./mvnw clean test
      
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Test Results
        path: student-management-system/target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: student-management-system/target/surefire-reports/
