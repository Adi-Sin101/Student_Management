<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card border-warning">
                    <div class="card-body">
                        <h1 class="display-1 text-warning">403</h1>
                        <h3 class="text-muted">Access Denied</h3>
                        <p class="text-muted" th:text="${errorMessage ?: 'You don\\'t have permission to access this resource.'}">
                            You don't have permission to access this resource.
                        </p>
                        <a th:href="@{/dashboard}" class="btn btn-primary">
                            <i class="bi bi-house"></i> Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
