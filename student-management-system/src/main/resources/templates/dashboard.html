<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-speedometer2"></i> Dashboard</h1>
                <p class="lead">Welcome back, <span th:text="${user?.name ?: 'User'}">User</span>!</p>
            </div>
        </div>

        <!-- Teacher Dashboard -->
        <div sec:authorize="hasRole('TEACHER')">
            <div class="row">
                <div class="col-md-3 mb-4">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">Students</h6>
                                    <h2 class="card-title mb-0"><i class="bi bi-people-fill"></i></h2>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <a th:href="@{/students}" class="text-white text-decoration-none">
                                View All <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card bg-success text-white h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">Teachers</h6>
                                    <h2 class="card-title mb-0"><i class="bi bi-person-badge-fill"></i></h2>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <a th:href="@{/teachers}" class="text-white text-decoration-none">
                                View All <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card bg-info text-white h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">Courses</h6>
                                    <h2 class="card-title mb-0"><i class="bi bi-book-fill"></i></h2>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <a th:href="@{/courses}" class="text-white text-decoration-none">
                                View All <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card bg-warning text-dark h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">Departments</h6>
                                    <h2 class="card-title mb-0"><i class="bi bi-building-fill"></i></h2>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <a th:href="@{/departments}" class="text-dark text-decoration-none">
                                View All <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <i class="bi bi-lightning-fill"></i> Quick Actions
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3">
                                    <a th:href="@{/students/create}" class="btn btn-outline-primary w-100 mb-2">
                                        <i class="bi bi-person-plus"></i> Add Student
                                    </a>
                                </div>
                                <div class="col-md-3">
                                    <a th:href="@{/teachers/create}" class="btn btn-outline-success w-100 mb-2">
                                        <i class="bi bi-person-plus-fill"></i> Add Teacher
                                    </a>
                                </div>
                                <div class="col-md-3">
                                    <a th:href="@{/courses/create}" class="btn btn-outline-info w-100 mb-2">
                                        <i class="bi bi-journal-plus"></i> Add Course
                                    </a>
                                </div>
                                <div class="col-md-3">
                                    <a th:href="@{/departments/create}" class="btn btn-outline-warning w-100 mb-2">
                                        <i class="bi bi-building-add"></i> Add Department
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Student Dashboard -->
        <div sec:authorize="hasRole('STUDENT')">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header bg-primary text-white">
                            <i class="bi bi-person-circle"></i> My Profile
                        </div>
                        <div class="card-body">
                            <p><strong>Name:</strong> <span th:text="${user?.name}">N/A</span></p>
                            <p><strong>Email:</strong> <span th:text="${user?.email}">N/A</span></p>
                            <p><strong>Roll:</strong> <span th:text="${user?.roll}">N/A</span></p>
                            <p><strong>Department:</strong> <span th:text="${user?.department?.name ?: 'Not Assigned'}">N/A</span></p>
                        </div>
                        <div class="card-footer">
                            <a th:href="@{/students/{id}/edit(id=${user?.id})}" class="btn btn-primary">
                                <i class="bi bi-pencil"></i> Edit Profile
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header bg-info text-white">
                            <i class="bi bi-book"></i> My Courses
                        </div>
                        <div class="card-body">
                            <ul class="list-group list-group-flush" th:if="${user?.courses != null && !user.courses.empty}">
                                <li class="list-group-item" th:each="course : ${user.courses}">
                                    <i class="bi bi-journal-bookmark"></i> <span th:text="${course.name}">Course</span>
                                </li>
                            </ul>
                            <p th:if="${user?.courses == null || user.courses.empty}" class="text-muted">
                                No courses enrolled yet.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
