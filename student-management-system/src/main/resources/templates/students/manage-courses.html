<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Courses - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-journal-bookmark"></i> Manage My Courses</h2>
            <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Profile
            </a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-circle"></i> Student Information</h5>
            </div>
            <div class="card-body">
                <p><strong>Name:</strong> <span th:text="${student.name}"></span></p>
                <p><strong>Roll:</strong> <span th:text="${student.roll}"></span></p>
                <p><strong>Email:</strong> <span th:text="${student.email}"></span></p>
                <p><strong>Department:</strong>
                    <span th:text="${student.department != null ? student.department.name : 'Not Assigned'}"></span>
                </p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="bi bi-check-circle"></i> My Enrolled Courses</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${student.courses.isEmpty()}" class="text-muted text-center p-4">
                            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                            <p>You are not enrolled in any courses yet.</p>
                        </div>
                        <div th:unless="${student.courses.isEmpty()}" class="list-group">
                            <div th:each="course : ${student.courses}"
                                 class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1" th:text="${course.name}"></h6>
                                    <small class="text-muted" th:text="${course.description}"></small>
                                    <br>
                                    <small class="text-muted">
                                        <i class="bi bi-building"></i>
                                        <span th:text="${course.department != null ? course.department.name : 'No Department'}"></span>
                                    </small>
                                </div>
                                <form th:action="@{/students/{sid}/courses/{cid}/unenroll(sid=${student.id}, cid=${course.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Are you sure you want to unenroll from this course?')">
                                        <i class="bi bi-dash-circle"></i> Unenroll
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Available Courses</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(allCourses)}" class="text-muted text-center p-4">
                            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                            <p>No courses available at the moment.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(allCourses)}" class="list-group" style="max-height: 500px; overflow-y: auto;">
                            <div th:each="course : ${allCourses}"
                                 class="list-group-item d-flex justify-content-between align-items-center"
                                 th:classappend="${#lists.contains(enrolledCourseIds, course.id)} ? 'd-none' : ''">
                                <div>
                                    <h6 class="mb-1" th:text="${course.name}"></h6>
                                    <small class="text-muted" th:text="${course.description}"></small>
                                    <br>
                                    <small class="text-muted">
                                        <i class="bi bi-building"></i>
                                        <span th:text="${course.department != null ? course.department.name : 'No Department'}"></span>
                                    </small>
                                    <br>
                                    <small class="text-muted">
                                        <i class="bi bi-person"></i>
                                        <span th:text="${course.teacher != null ? course.teacher.name : 'No Teacher'}"></span>
                                    </small>
                                </div>
                                <form th:action="@{/students/{sid}/courses/{cid}/enroll(sid=${student.id}, cid=${course.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-success">
                                        <i class="bi bi-plus-circle"></i> Enroll
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
