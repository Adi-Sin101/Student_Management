<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-building"></i> Departments</h1>
            <a th:href="@{/departments/create}" class="btn btn-primary">
                <i class="bi bi-building-add"></i> Add Department
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Teachers</th>
                                <th>Students</th>
                                <th>Courses</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="department : ${departments}">
                                <td th:text="${department.id}">1</td>
                                <td th:text="${department.name}">Computer Science</td>
                                <td>
                                    <span class="badge bg-success" th:text="${department.teachers?.size() ?: 0}">0</span>
                                </td>
                                <td>
                                    <span class="badge bg-primary" th:text="${department.students?.size() ?: 0}">0</span>
                                </td>
                                <td>
                                    <span class="badge bg-info" th:text="${department.courses?.size() ?: 0}">0</span>
                                </td>
                                <td>
                                    <a th:href="@{/departments/{id}(id=${department.id})}" class="btn btn-sm btn-info">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/departments/{id}/edit(id=${department.id})}" class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/departments/{id}/delete(id=${department.id})}" method="post"
                                          class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this department?');">
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(departments)}">
                                <td colspan="6" class="text-center text-muted">No departments found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
