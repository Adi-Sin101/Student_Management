<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-building"></i> Department Details</h1>
            <div>
                <a th:href="@{/departments/{id}/edit(id=${department.id})}" class="btn btn-warning">
                    <i class="bi bi-pencil"></i> Edit
                </a>
                <a th:href="@{/departments}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back to List
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-warning">
                        <i class="bi bi-building-fill"></i> Department Information
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tr>
                                <th width="30%">ID:</th>
                                <td th:text="${department.id}">1</td>
                            </tr>
                            <tr>
                                <th>Name:</th>
                                <td th:text="${department.name}">Computer Science</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-person-badge"></i> Teachers
                        <span class="badge bg-light text-dark" th:text="${department.teachers?.size() ?: 0}">0</span>
                    </div>
                    <div class="card-body" style="max-height: 300px; overflow-y: auto;">
                        <ul class="list-group list-group-flush" th:if="${department.teachers != null && !department.teachers.empty}">
                            <li class="list-group-item d-flex justify-content-between align-items-center"
                                th:each="teacher : ${department.teachers}">
                                <span>
                                    <i class="bi bi-person-fill"></i>
                                    <span th:text="${teacher.name}">Teacher Name</span>
                                </span>
                                <a th:href="@{/teachers/{id}(id=${teacher.id})}" class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </li>
                        </ul>
                        <p th:if="${department.teachers == null || department.teachers.empty}" class="text-muted mb-0">
                            No teachers in this department.
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-people"></i> Students
                        <span class="badge bg-light text-dark" th:text="${department.students?.size() ?: 0}">0</span>
                    </div>
                    <div class="card-body" style="max-height: 300px; overflow-y: auto;">
                        <ul class="list-group list-group-flush" th:if="${department.students != null && !department.students.empty}">
                            <li class="list-group-item d-flex justify-content-between align-items-center"
                                th:each="student : ${department.students}">
                                <span>
                                    <i class="bi bi-person"></i>
                                    <span th:text="${student.name}">Student Name</span>
                                    <small class="text-muted" th:text="' (' + ${student.roll} + ')'">Roll</small>
                                </span>
                                <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </li>
                        </ul>
                        <p th:if="${department.students == null || department.students.empty}" class="text-muted mb-0">
                            No students in this department.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <i class="bi bi-book"></i> Courses
                        <span class="badge bg-light text-dark" th:text="${department.courses?.size() ?: 0}">0</span>
                    </div>
                    <div class="card-body">
                        <div class="row" th:if="${department.courses != null && !department.courses.empty}">
                            <div class="col-md-4 mb-3" th:each="course : ${department.courses}">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h6 class="card-title" th:text="${course.name}">Course Name</h6>
                                        <p class="card-text small text-muted"
                                           th:text="${#strings.abbreviate(course.description ?: 'No description', 100)}">Description</p>
                                    </div>
                                    <div class="card-footer">
                                        <a th:href="@{/courses/{id}(id=${course.id})}" class="btn btn-sm btn-outline-info">
                                            <i class="bi bi-eye"></i> View
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <p th:if="${department.courses == null || department.courses.empty}" class="text-muted mb-0">
                            No courses in this department.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
