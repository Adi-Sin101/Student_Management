<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-person-badge"></i> Teachers</h1>
            <a th:href="@{/teachers/create}" class="btn btn-primary">
                <i class="bi bi-person-plus-fill"></i> Add Teacher
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Students</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="teacher : ${teachers}">
                                <td th:text="${teacher.id}">1</td>
                                <td th:text="${teacher.name}">Dr. Smith</td>
                                <td th:text="${teacher.email}">smith@example.com</td>
                                <td th:text="${teacher.department?.name ?: 'N/A'}">Computer Science</td>
                                <td>
                                    <span class="badge bg-info" th:text="${teacher.students?.size() ?: 0}">0</span>
                                </td>
                                <td>
                                    <a th:href="@{/teachers/{id}(id=${teacher.id})}" class="btn btn-sm btn-info">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/teachers/{id}/edit(id=${teacher.id})}" class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/teachers/{id}/assign-students(id=${teacher.id})}" class="btn btn-sm btn-success">
                                        <i class="bi bi-people"></i>
                                    </a>
                                    <form th:action="@{/teachers/{id}/delete(id=${teacher.id})}" method="post"
                                          class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this teacher?');">
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(teachers)}">
                                <td colspan="6" class="text-center text-muted">No teachers found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
