<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-person-badge"></i> Teacher Details</h1>
            <div>
                <a th:href="@{/teachers/{id}/edit(id=${teacher.id})}" class="btn btn-warning">
                    <i class="bi bi-pencil"></i> Edit
                </a>
                <a th:href="@{/teachers/{id}/assign-students(id=${teacher.id})}" class="btn btn-success">
                    <i class="bi bi-people"></i> Assign Students
                </a>
                <a th:href="@{/teachers}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back to List
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-person-circle"></i> Teacher Information
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tr>
                                <th width="30%">ID:</th>
                                <td th:text="${teacher.id}">1</td>
                            </tr>
                            <tr>
                                <th>Name:</th>
                                <td th:text="${teacher.name}">Dr. Smith</td>
                            </tr>
                            <tr>
                                <th>Email:</th>
                                <td th:text="${teacher.email}">smith@example.com</td>
                            </tr>
                            <tr>
                                <th>Department:</th>
                                <td th:text="${teacher.department?.name ?: 'Not Assigned'}">Computer Science</td>
                            </tr>
                            <tr>
                                <th>Role:</th>
                                <td><span class="badge bg-success" th:text="${teacher.role}">TEACHER</span></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-people"></i> Assigned Students
                        <span class="badge bg-light text-dark" th:text="${teacher.students?.size() ?: 0}">0</span>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush" th:if="${teacher.students != null && !teacher.students.empty}">
                            <li class="list-group-item d-flex justify-content-between align-items-center"
                                th:each="student : ${teacher.students}">
                                <span>
                                    <i class="bi bi-person"></i>
                                    <span th:text="${student.name}">Student Name</span>
                                    <small class="text-muted" th:text="' (' + ${student.roll} + ')'">Roll</small>
                                </span>
                                <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </li>
                        </ul>
                        <p th:if="${teacher.students == null || teacher.students.empty}" class="text-muted mb-0">
                            No students assigned yet.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
