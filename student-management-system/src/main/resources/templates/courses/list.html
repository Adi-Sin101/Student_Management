<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-book"></i> Courses</h1>
            <a th:href="@{/courses/create}" class="btn btn-primary">
                <i class="bi bi-journal-plus"></i> Add Course
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Department</th>
                                <th>Teacher</th>
                                <th>Students</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="course : ${courses}">
                                <td th:text="${course.id}">1</td>
                                <td th:text="${course.name}">Data Structures</td>
                                <td th:text="${#strings.abbreviate(course.description ?: '', 50)}">Description</td>
                                <td th:text="${course.department?.name ?: 'N/A'}">Computer Science</td>
                                <td th:text="${course.teacher?.name ?: 'N/A'}">Dr. Smith</td>
                                <td>
                                    <span class="badge bg-info" th:text="${course.students?.size() ?: 0}">0</span>
                                </td>
                                <td>
                                    <a th:href="@{/courses/{id}(id=${course.id})}" class="btn btn-sm btn-info">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/courses/{id}/edit(id=${course.id})}" class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/courses/{id}/assign-students(id=${course.id})}" class="btn btn-sm btn-success">
                                        <i class="bi bi-people"></i>
                                    </a>
                                    <form th:action="@{/courses/{id}/delete(id=${course.id})}" method="post"
                                          class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this course?');">
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(courses)}">
                                <td colspan="7" class="text-center text-muted">No courses found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
