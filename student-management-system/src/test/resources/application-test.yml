# Test Profile Configuration
# This configuration is used when running tests with @ActiveProfiles("test")

spring:
  application:
    name: student-management-system-test

  # H2 In-Memory Database Configuration for Testing
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration for Tests
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # H2 Console (useful for debugging tests)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Security Configuration for Tests
  security:
    user:
      name: test-user
      password: test-password

# Logging Configuration for Tests
logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.example.studentmanagementsystem: DEBUG

# Test-specific settings
test:
  data:
    initialization-mode: always
