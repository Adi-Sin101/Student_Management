# ═══════════════════════════════════════════════════════════════════════
# GitHub Actions CI/CD Workflow - Student Management System
# ═══════════════════════════════════════════════════════════════════════
# 
# Purpose:
#   - Run comprehensive tests on all pull requests
#   - Enforce code quality standards
#   - Block merging if tests fail
#   - Generate coverage reports
#
# Triggers:
#   - Pull requests targeting main branch
#   - Direct pushes to main branch (discouraged)
#   - Manual workflow dispatch
#
# Enterprise Best Practices:
#   ✓ Automated testing on every PR
#   ✓ Parallel job execution for speed
#   ✓ Test result artifacts preserved
#   ✓ Coverage reporting
#   ✓ Branch protection enforcement
# ═══════════════════════════════════════════════════════════════════════

name: 🧪 CI/CD Testing Pipeline

on:
  # Trigger on pull requests to main
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  
  # Trigger on push to main (after PR merge)
  push:
    branches: [ main ]
  
  # Allow manual workflow dispatch
  workflow_dispatch:

# Cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Define environment variables
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Build and Test
  # ═══════════════════════════════════════════════════════════════
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─────────────────────────────────────────────────────────
      # Checkout the code
      # ─────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      # ─────────────────────────────────────────────────────────
      # Set up Java Development Kit
      # ─────────────────────────────────────────────────────────
      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      # ─────────────────────────────────────────────────────────
      # Cache Maven dependencies for faster builds
      # ─────────────────────────────────────────────────────────
      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ─────────────────────────────────────────────────────────
      # Verify environment setup
      # ─────────────────────────────────────────────────────────
      - name: 🔍 Verify environment
        run: |
          echo "Java Version:"
          java -version
          echo ""
          echo "Maven Version:"
          mvn --version

      # ─────────────────────────────────────────────────────────
      # Build the project (compile without running tests)
      # ─────────────────────────────────────────────────────────
      - name: 🔨 Build project
        run: mvn clean compile -DskipTests

      # ─────────────────────────────────────────────────────────
      # Run all unit and integration tests
      # ─────────────────────────────────────────────────────────
      - name: 🧪 Run all tests
        run: mvn test

      # ─────────────────────────────────────────────────────────
      # Generate JaCoCo code coverage report
      # ─────────────────────────────────────────────────────────
      - name: 📊 Generate coverage report
        run: mvn jacoco:report
        if: always()

      # ─────────────────────────────────────────────────────────
      # Upload test results as artifacts
      # ─────────────────────────────────────────────────────────
      - name: 📤 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 30

      # ─────────────────────────────────────────────────────────
      # Publish test summary to GitHub UI
      # ─────────────────────────────────────────────────────────
      - name: 📝 Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 🧪 Maven Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      # ─────────────────────────────────────────────────────────
      # Upload coverage to Codecov
      # ─────────────────────────────────────────────────────────
      - name: 📈 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
        continue-on-error: true

      # ─────────────────────────────────────────────────────────
      # Package the application
      # ─────────────────────────────────────────────────────────
      - name: 📦 Package application
        run: mvn package -DskipTests

      # ─────────────────────────────────────────────────────────
      # Upload JAR artifact
      # ─────────────────────────────────────────────────────────
      - name: 📤 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Code Quality Analysis
  # ═══════════════════════════════════════════════════════════════
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: ✅ Verify code compilation
        run: mvn clean verify -DskipTests

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Summary Report
  # ═══════════════════════════════════════════════════════════════
  summary:
    name: 📊 CI/CD Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: always()

    steps:
      - name: 📋 Generate pipeline summary
        run: |
          echo "# 🎯 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📝 Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if tests failed
        if: needs.build-and-test.result == 'failure'
        run: |
          echo "::error::Tests failed. Cannot merge PR."
          exit 1

# ═══════════════════════════════════════════════════════════════
# Workflow Permissions
# ═══════════════════════════════════════════════════════════════
permissions:
  contents: read
  pull-requests: write
  checks: write
