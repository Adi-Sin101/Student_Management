version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: student-management-db
    environment:
      POSTGRES_DB: student-managementDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adiba2002
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - student-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: student-management-app
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/student-managementDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: adiba2002
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - student-network

volumes:
  postgres_data:

networks:
  student-network:
    driver: bridge
